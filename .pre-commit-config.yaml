repos:


- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 6fec9b7edb08fd9989088709d864a7826dc74e80  # frozen: v0.15.12
  hooks:
    - id: ruff-check
    - id: ruff-format

- repo: https://github.com/adamchainz/blacken-docs
  rev: dda8db18cfc68df532abf33b185ecd12d5b7b326  # frozen: 1.20.0
  hooks:
  - id: blacken-docs
    additional_dependencies: [black==24.8.0]

- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
  hooks:
  - id: codespell
    args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt"]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: ed81924a8b1cecdaa570b072528fa80c9c4d6ccd  # frozen: 0.37.1
  hooks:
    - id: check-github-workflows
      name: "Check GitHub workflows"
      files: ^\.github/workflows/
      types: [yaml]

- repo: https://github.com/ansys/pre-commit-hooks
  rev: 4c4d32dbb88444eac57f3fad6e3b1a2d52978f64  # frozen: v0.7.1
  hooks:
    - id: add-license-headers
      args:
      - --start_year=2021


- repo: https://github.com/crate-ci/typos
  rev: c96c46fae465ab9e3607401d9ce93d75e7998023  # frozen: v1
  hooks:
    - id: typos
      args: ["--config", "doc/styles/typos.toml"]
      exclude: "doc/styles/config/vocabularies"