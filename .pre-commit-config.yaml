repos:


- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 2700fd5671c633760d912769c041bfcde2b9a01b  # frozen: v0.15.22
  hooks:
    - id: ruff-check
    - id: ruff-format

- repo: https://github.com/adamchainz/blacken-docs
  rev: dda8db18cfc68df532abf33b185ecd12d5b7b326  # frozen: 1.20.0
  hooks:
  - id: blacken-docs
    additional_dependencies: [black==24.8.0]

- repo: https://github.com/codespell-project/codespell
  rev: 57b21406f092110c18776e39b0bda50d37c945c8  # frozen: v2.4.3
  hooks:
  - id: codespell
    args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt"]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 0.37.4
  hooks:
    - id: check-github-workflows
      name: "Check GitHub workflows"
      files: ^\.github/workflows/
      types: [yaml]

- repo: https://github.com/ansys/pre-commit-hooks
  rev: 55c5b6a5439abd847613579c6924da750e8b78b2  # frozen: v0.8.0
  hooks:
    - id: add-license-headers
      args:
      - --start_year=2021


- repo: https://github.com/crate-ci/typos
  rev: v1
  hooks:
    - id: typos
      args: ["--config", "doc/styles/typos.toml"]
      exclude: "doc/styles/config/vocabularies"
